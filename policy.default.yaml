# KYA-Broker default policy template.
# setup.py copies this to ~/.claude/skills/kya-broker.local/config.yaml
# and the user edits thresholds + enrolls payment methods.

version: 2

# --- Spending thresholds (USD) ---
# L0 (auto-execute): amount <= l0_ceiling AND audit approves → execute without
#                    user confirm (still subject to the rail's own L2 gate; e.g.
#                    card rails always require a human gate for card entry).
# L1 (audit + human gate): l0 < amount <= l1_ceiling → audit approves, then human
#                          completes the rail's gate (MetaMask / card / OTP).
# L2 (explicit user confirm): amount > l1_ceiling → broker halts; ask human before
#                             proposing.
thresholds:
  l0_ceiling_usd: 2.00
  l1_ceiling_usd: 50.00
  daily_cap_usd: 200.00
  monthly_cap_usd: 1000.00

# --- Audit layer ---
audit:
  primary: auto          # codex | claude | auto
  shadow_mode: false
  fallback_on_primary_failure: false
  timeout_seconds: 30
  codex:
    model: gpt-5-codex
    binary_path: null
  claude:
    model: claude-sonnet-4-6
    max_output_tokens: 2000

# --- Payment methods the user has enrolled ---
# These are labels only — no card numbers, no private keys. We store last4 for
# cards and wallet address for crypto purely for UI ("which card was charged?").
# A method becomes "usable" once declared here; at execution time the actual
# fill / sign still happens via the browser / extension, never in the broker.
payment_methods: []
#   - name: "research visa"
#     rail: card
#     last4: "4242"
#     notes: "chrome autofill profile 'work'"
#     max_auto_execute_usd: 20.00
#
#   - name: "metamask main"
#     rail: crypto
#     wallet_address: "0xabc...def"
#     notes: "Polygon USDC"
#
#   - name: "magic-link"
#     rail: email_link
#     notes: "warrenzhong666@gmail.com"

# --- Rail preference (first = highest priority) ---
# `intent.rail_hint` from the agent overrides this when compatible.
rails:
  - card
  - crypto
  - email_link
  # bank_transfer not yet supported

# --- Merchants the broker is allowed to pay ---
# Each merchant declares {rail: playbook} pairs for the rails it supports.
merchants:
  - name: openrouter.ai
    homepage_url: https://openrouter.ai
    credit_page_url: https://openrouter.ai/credits
    preferred_rail: card
    max_single_topup_usd: 50.00
    playbooks:
      card: openrouter_topup_card.yaml
      crypto: openrouter_topup_crypto.yaml
    notes: "OpenRouter: LLM API credit topup. Card is via Stripe; crypto is via Coinbase Commerce."

  - name: vast.ai
    homepage_url: https://vast.ai
    credit_page_url: https://vast.ai/billing
    preferred_rail: crypto
    max_single_topup_usd: 50.00
    playbooks:
      crypto: vast_topup_crypto.yaml
      card: vast_topup_card.yaml
    notes: "vast.ai: GPU rental. Crypto is via crypto.com checkout; card via Stripe."

  - name: anthropic.com
    homepage_url: https://console.anthropic.com
    credit_page_url: https://console.anthropic.com/settings/billing
    preferred_rail: card
    max_single_topup_usd: 200.00
    playbooks:
      card: anthropic_topup_card.yaml
    notes: "Anthropic API credit topup."

# --- Chrome ---
chrome:
  binary_path: null
  cdp_port: 9222
  profile_dir: null
  human_gate_timeout_s: 300     # max seconds we wait for a human-in-loop step

# --- Notifications for human-gate moments ---
notifications:
  channels:
    - terminal
    - popup                   # open a local HTTP popup window for OTP / confirm
    # - osascript_notify      # macOS banner notification
    # - osascript_say         # speak the reason aloud (macOS)
  poll_interval_s: 1.0

# --- Broker-issued email OTP (final authorization floor) ---
# Every intent — regardless of merchant or rail — requires the user to confirm
# a 6-digit code sent to the locked email. This runs BEFORE Chrome drives the
# merchant's checkout, so it gates whether the browser flow even starts.
# SMTP creds live in .env (KYA_BROKER_SMTP_*), NEVER in this file.
email_otp:
  enabled: true
  timeout_seconds: 300

# --- Observability ---
observability:
  capture_on_failure: true
  retain_raw_audit_output: true
