name: openrouter_topup_crypto
description: Top up openrouter.ai API credits using crypto (USDC via Coinbase Commerce).
rail: crypto
version: 1

preconditions:
  - "User is signed in to openrouter.ai."
  - "MetaMask (or another wallet) is installed and funded with at least amount_usd USDC."

steps:
  - goto: "https://openrouter.ai/credits"

  - wait_for_human:
      reason: login
      optional: true
      presence_keywords: [sign in, log in, continue with google]
      detect_completion_keywords: [credits, balance, add credits]
      timeout: 180s

  - click_visual: "Add Credits"

  - wait_for: "topup modal is visible"

  - fill_amount: "${{ intent.amount_usd }}"

  - select_payment_method: "Crypto"

  - wait_for: "coinbase commerce checkout iframe loads"

  - click_visual: "Connect Wallet"

  - select_payment_method: "MetaMask"

  - wait_for_human:
      reason: metamask_sign
      prompt: |
        MetaMask should be asking you to sign a USDC transfer of
        $${{ intent.amount_usd }} to openrouter.ai's receiving address.
        Review the amount and recipient, then click Confirm.
      detect_completion_keywords:
        - confirmed
        - transaction sent
        - payment received
      detect_decline_keywords:
        - rejected
        - user denied
        - cancelled
      timeout: 300s

  - wait_for_merchant_settlement:
      merchant: openrouter.ai
      expected_amount: "$${{ intent.amount_usd }}"
      timeout: 300s

  - record_outcome:
      state: settled
      tx_hash_from_page: true
