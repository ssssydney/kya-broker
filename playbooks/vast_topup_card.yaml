name: vast_topup_card
description: Top up vast.ai GPU-rental credits using a credit card via Stripe.
rail: card
version: 1

preconditions:
  - "User is signed in at https://vast.ai/billing."
  - "User is willing to enter a credit card in the browser (saved or manual)."

steps:
  - goto: "https://vast.ai/billing"

  - wait_for: "billing page loaded"

  - click_visual: "Add Credits"

  - fill_amount: "${{ intent.amount_usd }}"

  - select_payment_method: "Credit Card"

  - wait_for_human:
      reason: card_details
      prompt: |
        vast.ai's Stripe checkout is ready. Enter your card (or use a saved
        card / Apple Pay / 1Password) and click Pay $${{ intent.amount_usd }}.
      detect_completion_keywords: [payment successful, payment succeeded, credits added, thank you]
      detect_decline_keywords: [card declined, payment failed, insufficient funds]
      timeout: 240s

  - wait_for_human:
      reason: card_3ds
      optional: true
      presence_keywords: [verify your identity, 3d secure, authentication required, one-time code]
      detect_completion_keywords: [payment successful, verification successful]
      detect_decline_keywords: [authentication failed, verification failed]
      timeout: 180s

  - wait_for_merchant_settlement:
      merchant: vast.ai
      expected_amount: "$${{ intent.amount_usd }}"
      timeout: 120s

  - record_outcome:
      state: settled
      merchant_receipt_from: "vast.ai billing history top entry"
