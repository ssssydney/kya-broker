name: openrouter_topup_card
description: Top up openrouter.ai API credits using a credit card via Stripe checkout.
rail: card
version: 1

preconditions:
  - "User is signed in to openrouter.ai (or will sign in via the login gate below)."
  - "User has a credit card they are willing to enter in the browser (saved via 1Password / Chrome autofill or typed manually)."

steps:
  - goto: "https://openrouter.ai/credits"

  # OpenRouter uses Google OAuth + email magic-link. If we land on a sign-in
  # page, surface a human gate and let the user authenticate.
  - wait_for_human:
      reason: login
      optional: true
      presence_keywords:
        - sign in
        - log in
        - continue with google
      detect_completion_keywords:
        - credits
        - balance
        - add credits
      timeout: 180s

  - click_visual: "Add Credits"

  - wait_for: "topup modal is visible"

  - fill_amount: "${{ intent.amount_usd }}"

  # Select card as the payment rail inside the modal.
  - select_payment_method: "Card"

  # The user has to enter card details (Stripe iframe) or pick a saved card from
  # browser / 1Password. We do NOT fill the card fields; that would mean the
  # broker touches card data.
  - wait_for_human:
      reason: card_details
      prompt: |
        OpenRouter's Stripe checkout is ready. Enter your card (or pick a saved
        card from Chrome / 1Password / Apple Pay) and click Pay. The broker will
        watch for the success page.
      # Completion signal: success page or balance updated banner.
      detect_completion_keywords:
        - payment successful
        - payment succeeded
        - credits added
        - thank you
      detect_decline_keywords:
        - card declined
        - payment failed
        - insufficient funds
      timeout: 240s

  # Some banks present a 3D-Secure challenge after the Pay click. Skip if no
  # challenge element is present.
  - wait_for_human:
      reason: card_3ds
      optional: true
      presence_keywords:
        - verify your identity
        - 3d secure
        - authentication required
        - one-time code
      detect_completion_keywords:
        - payment successful
        - verification successful
      detect_decline_keywords:
        - authentication failed
        - verification failed
      timeout: 180s

  - wait_for_merchant_settlement:
      merchant: openrouter.ai
      expected_amount: "$${{ intent.amount_usd }}"
      timeout: 120s

  - record_outcome:
      state: settled
      merchant_receipt_from: "openrouter credits page banner"

failure_modes:
  login_timeout:
    detect: "login gate exceeded timeout"
    action: "mark playbook_broken; user never signed in"
    user_message: |
      Sign in to openrouter.ai in the Chrome tab (Google OAuth or email magic
      link), then ask Claude to retry the topup.

  card_declined:
    detect: "page shows card_declined text during card_details gate"
    action: "mark failed; no retry"
    user_message: |
      Your card was declined by the issuing bank. Try a different card, or
      check whether the bank flagged it for fraud review.

  3ds_failed:
    detect: "3DS challenge failed or was cancelled"
    action: "mark user_declined; do not retry"
    user_message: |
      3D-Secure authentication failed or was cancelled. No charge went through.
      If this was accidental, ask Claude to retry.

  settlement_timeout:
    detect: "credits page did not show updated balance within timeout"
    action: "mark failed with reason=settlement_timeout; save Stripe receipt"
    user_message: |
      Payment was charged but openrouter.ai hasn't reflected the new balance.
      Usually resolves in a minute. If not, contact openrouter support with
      the Stripe receipt in the Chrome tab.
