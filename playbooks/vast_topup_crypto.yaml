name: vast_topup_crypto
description: Top up vast.ai GPU-rental credits using MetaMask USDC via crypto.com checkout.
rail: crypto
version: 2

preconditions:
  - "User is signed in at https://vast.ai/billing."
  - "MetaMask is installed in this Chrome profile with sufficient USDC."

steps:
  - goto: "https://vast.ai/billing"

  - wait_for: "billing page loaded"

  - click_visual: "Add Credits"

  - wait_for: "topup modal open"

  - fill_amount: "${{ intent.amount_usd }}"

  - select_payment_method: "Crypto"

  - wait_for: "crypto.com checkout frame loads"

  - click_visual: "Connect Wallet"

  - select_payment_method: "MetaMask"

  - wait_for_human:
      reason: metamask_sign
      prompt: |
        MetaMask should be asking you to sign a USDC transfer of
        $${{ intent.amount_usd }} to vast.ai's receiving address. Review
        the amount and recipient, then click Confirm.
      detect_completion_keywords: [confirmed, transaction sent, payment received]
      detect_decline_keywords: [rejected, user denied, cancelled]
      timeout: 300s

  - wait_for: "crypto.com shows Payment received"

  - wait_for_merchant_settlement:
      merchant: vast.ai
      expected_amount: "$${{ intent.amount_usd }}"
      timeout: 300s

  - record_outcome:
      state: settled
      tx_hash_from_page: true
      merchant_receipt_from: "vast.ai billing history top entry"

failure_modes:
  metamask_popup_missing:
    detect: "metamask_sign gate timed out without seeing signed/declined text"
    action: "mark playbook_broken; dump DOM + screenshot"
    user_message: |
      MetaMask popup never appeared. Open MetaMask manually to unlock it, then
      retry the topup.
  user_declined:
    detect: "metamask_sign gate saw decline keywords"
    action: "mark user_declined"
    user_message: |
      You declined the MetaMask signature. No charge happened.
  merchant_settlement_timeout:
    detect: "wait_for_merchant_settlement exceeded timeout"
    action: "mark failed; keep tx hash for manual reconcile"
    user_message: |
      On-chain tx confirmed but vast.ai hasn't credited the account. It usually
      arrives within 5 minutes. If not, file a ticket with the tx hash.
