name: vast_launch_gpu
description: Launch a vast.ai GPU instance after credit is available
version: 1

# This playbook runs AFTER a successful topup. It's parameterised from the
# experiment spec rather than from a payment intent. Claude Code calls it via
# SSH helpers once `broker status` is settled.

preconditions:
  - vast_credit_sufficient: "vast.ai account balance >= estimated_cost_usd"

parameters:
  gpu_class: "RTX 4090 | A100 | H100"
  num_gpus: 1
  disk_gb: 40
  image: "pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime"
  estimated_cost_usd: 8.50
  max_bid_per_hour_usd: 1.50

steps:
  - goto: "https://vast.ai/console/create/"

  - filter:
      gpu_name: "${{ parameters.gpu_class }}"
      num_gpus: "${{ parameters.num_gpus }}"
      disk_gb_min: "${{ parameters.disk_gb }}"
      verified_only: true
      reliability_min: 0.98
      sort_by: "Price (lowest)"

  - pick_first_offer_below:
      max_hourly_usd: "${{ parameters.max_bid_per_hour_usd }}"

  - set_image: "${{ parameters.image }}"

  - set_onstart: |
      #!/bin/bash
      pip install -r /workspace/requirements.txt || true

  - click_visual: "Rent"

  - wait_for_instance_ready:
      timeout: 600s

  - record_outcome:
      state: settled
      extract:
        instance_id: "url /console/instances/(\\d+)"
        ssh_host: "instance card → SSH host"
        ssh_port: "instance card → SSH port"

failure_modes:
  no_offers:
    detect: "filter returns zero results within 30s"
    action: "mark failed; return reason='no_offers_matching_criteria'"
    user_message: |
      No vast.ai offers currently match your GPU class + bid criteria. Try a different
      GPU class or raise max_bid_per_hour_usd.

  offer_lost_race:
    detect: "Rent button returns 'offer no longer available'"
    action: "retry with next offer up to 3 times"
    user_message: |
      Offer was taken by another user mid-click. Retrying automatically.

  instance_never_ready:
    detect: "wait_for_instance_ready exceeded timeout"
    action: "mark failed; attach instance_id for manual cleanup"
    user_message: |
      vast instance created but never became SSH-reachable. It may still be billing you —
      go to vast.ai/console/instances and delete it manually.
